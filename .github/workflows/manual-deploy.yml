name: Manual CI/CD Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "🚀 Select environment to deploy"
        required: true
        type: choice
        options:
          - dev
          - qa
          - prod

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:

  # ======================
  # CI STAGE (Always runs first)
  # ======================
  ci:
    runs-on: ubuntu-latest
    name: "🔨 CI: Build & Test"

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: 🧪 Build & Test
        run: mvn clean test

      - name: 📦 Package
        run: mvn clean package -DskipTests

      - name: 📤 Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/employee-service-*.jar
          retention-days: 1


  # ======================
  # DEV DEPLOY (Direct - No Approval)
  # ======================
  deploy-dev:
    needs: ci
    if: ${{ github.event.inputs.environment == 'dev' }}
    runs-on: ubuntu-latest
    name: "🚀 DEV Deploy"
    environment:
      name: dev
      url: https://dev-employee-service.render.com

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ✅ Deploy to DEV (Direct Deployment)
        run: |
          echo "🎯 Deploying to DEV environment..."
          curl -X POST ${{ secrets.RENDER_DEV_HOOK }} \
            -H "Content-Type: application/json" \
            -d '{"commit_hash":"${{ github.sha }}"}'
          echo "✅ DEV deployment triggered successfully!"

      - name: 📝 Log Deployment
        run: |
          echo "Environment: DEV"
          echo "Commit: ${{ github.sha }}"
          echo "Triggered by: ${{ github.actor }}"
          echo "Timestamp: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"


  # ======================
  # QA DEPLOY (Manual Approval Required)
  # ======================
  deploy-qa:
    needs: ci
    if: ${{ github.event.inputs.environment == 'qa' }}
    runs-on: ubuntu-latest
    name: "🔍 QA Deploy"
    environment:
      name: qa
      url: https://qa-employee-service.render.com

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⏳ Wait for Manual Approval
        run: |
          echo "⏸️  Waiting for manual approval before deploying to QA..."
          echo "🔍 QA Environment - Review required before deployment"

      - name: ✅ Deploy to QA (Approved)
        run: |
          echo "✅ Manual approval received!"
          echo "🚀 Deploying to QA environment..."
          curl -X POST ${{ secrets.RENDER_QA_HOOK }} \
            -H "Content-Type: application/json" \
            -d '{"commit_hash":"${{ github.sha }}", "environment":"qa"}'
          echo "✅ QA deployment completed successfully!"

      - name: 📝 Log Deployment
        run: |
          echo "Environment: QA"
          echo "Status: DEPLOYED (After Manual Approval)"
          echo "Commit: ${{ github.sha }}"
          echo "Triggered by: ${{ github.actor }}"
          echo "Approved at: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"


  # ======================
  # PROD DEPLOY (Direct Deployment - Testing Mode)
  # ======================
  deploy-prod:
    needs: ci
    if: ${{ github.event.inputs.environment == 'prod' }}
    runs-on: ubuntu-latest
    name: "🌍 PROD Deploy"

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ✅ Deploy to PROD (Direct Deployment)
        run: |
          echo "🎯 Deploying to PROD environment..."
          curl -X POST ${{ secrets.RENDER_PROD_HOOK }} \
            -H "Content-Type: application/json" \
            -d '{"commit_hash":"${{ github.sha }}", "environment":"production"}'
          echo "✅ PROD deployment triggered successfully!"

      - name: 📝 Log Deployment
        run: |
          echo "Environment: PROD"
          echo "Status: DEPLOYED (Testing Mode - No Approval)"
          echo "Commit: ${{ github.sha }}"
          echo "Triggered by: ${{ github.actor }}"
          echo "Timestamp: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
