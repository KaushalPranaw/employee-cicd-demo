spring.application.name=employee-service
spring.profiles.active=dev

# DEV Environment Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/employee_db_dev
spring.datasource.username=employee_user_dev
spring.datasource.password=dev_password_123

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# DEV uses port 8080 (local development)
# On Render: will use 8080 (no conflict as separate service)
server.port=8080

# Application specific configs for DEV
app.environment=dev
app.log.level=DEBUG

