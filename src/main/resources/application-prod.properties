spring.application.name=employee-service
spring.profiles.active=prod

# PROD Environment Configuration
spring.datasource.url=jdbc:postgresql://prod-postgres-server:5432/employee_db_prod
spring.datasource.username=employee_user_prod
spring.datasource.password=${DB_PASSWORD_PROD:prod_password_123}

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# PROD uses port 8082 (local testing - avoids conflict with others)
# On Render: will use 8080 (no conflict as separate service)
# Can override: mvn spring-boot:run -Dserver.port=8082
server.port=8082

# Application specific configs for PROD
app.environment=prod
app.log.level=WARN

