spring.application.name=employee-service
spring.profiles.active=qa

# QA Environment Configuration
spring.datasource.url=jdbc:postgresql://qa-postgres-server:5432/employee_db_qa
spring.datasource.username=employee_user_qa
spring.datasource.password=${DB_PASSWORD_QA:qa_password_123}

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# QA uses port 8081 (local testing - avoids conflict with DEV on 8080)
# On Render: will use 8080 (no conflict as separate service)
# Can override: mvn spring-boot:run -Dserver.port=8081
server.port=8081

# Application specific configs for QA
app.environment=qa
app.log.level=INFO

