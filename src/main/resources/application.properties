spring.application.name=employee-service

# Default profile is 'dev' - gets overridden in CI/CD pipeline
spring.profiles.active=dev

# DATABASE CONFIGURATION (DEV - DEFAULT)
spring.datasource.url=jdbc:postgresql://localhost:5432/employee_db_dev
spring.datasource.username=employee_user_dev
spring.datasource.password=dev_password_123

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# SERVER PORT CONFIGURATION
# Local Development Ports (to avoid conflicts when running multiple instances):
#   - DEV:  8080 (application-dev.properties)
#   - QA:   8081 (application-qa.properties)
#   - PROD: 8082 (application-prod.properties)
# On Render: Each service gets its own instance, so conflicts don't occur
server.port=8080